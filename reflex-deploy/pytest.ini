[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Unit tests (no hardware required)
    mock: Mock serial tests (no hardware required)
    hardware: Requires real ESP32 hardware connected
    adversarial: Intentionally tries to break things
    slow: Tests that take >10 seconds
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning
